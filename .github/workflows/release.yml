name: Build Release Executables

# Runs the full build matrix on every push to main and every PR targeting main.
# The upload step is skipped unless the trigger is a version tag (e.g. v1.0.0).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run --group dev pytest -v --tb=short

  create-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Created once, up front, so the three build matrix legs below never
      # race each other to create a release for the same tag (they'd each
      # try, and only one can win — the others fail with "already_exists").
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2

  build:
    needs: create-release
    strategy:
      fail-fast: false   # let other platforms finish even if one fails
      matrix:
        include:
          - os: windows-latest
            artifact_name: stakeout-windows.exe
            exe_path: dist/stakeout.exe
          - os: macos-latest
            artifact_name: stakeout-macos
            exe_path: dist/stakeout
          - os: ubuntu-latest
            artifact_name: stakeout-linux
            exe_path: dist/stakeout

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: packages/dashboard/frontend
        run: npm ci

      - name: Build frontend
        working-directory: packages/dashboard/frontend
        run: npm run build

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable
        run: uv run pyinstaller stakeout.spec

      - name: Rename executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/stakeout.exe "dist/${{ matrix.artifact_name }}"
          else
            mv dist/stakeout "dist/${{ matrix.artifact_name }}"
          fi

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
